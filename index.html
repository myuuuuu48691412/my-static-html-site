<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Azure Static Web Apps - 遊べる特設ページ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-box {
      margin-top: 30px;
      padding: 20px;
      border: 2px solid #0078d4;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button {
      padding: 8px 16px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover { background-color: #005a9e; }
    input { padding: 6px; width: 60px; text-align: center; font-size: 14px; }
    .result { font-weight: bold; color: #d13438; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Azure Static Web Apps Demo</h1>
  <p>GitHub Actions からデプロイしています。 担当：松山</p>

  <div class="game-box">
    <h3>機能その1：1〜10の数当てゲーム</h3>
    <p>1から10の中で、コンピューターがハズレ（爆弾）を1つ隠しました。セーフな数字を当ててください！</p>
    <input type="number" id="guess-input" min="1" max="10" placeholder="5">
    <button onclick="playGame()">数字を選択</button>
    <div id="game-result" class="result"></div>
  </div>

  <div class="game-box">
    <h3>機能その2：本日のAzure開発運勢占い</h3>
    <p>今日のあなたのデプロイ運勢を占います。</p>
    <button onclick="drawOmikuji()">おみくじを引く</button>
    <div id="omikuji-result" class="result" style="color: #107c41; font-size: 18px;"></div>
  </div>

  <script>
    // 数当てゲームの初期化（爆弾の数字をランダムで1つ決定）
    let bombNumber = Math.floor(Math.random() * 10) + 1;

    function playGame() {
      const input = document.getElementById('guess-input').value;
      const resultDiv = document.getElementById('game-result');
      const guess = parseInt(input);

      if (isNaN(guess) || guess < 1 || guess > 10) {
        resultDiv.innerText = '1から10の数字を入力してください！';
        return;
      }

      if (guess === bombNumber) {
        resultDiv.innerHTML = '💥 ドカーン！爆弾を引いてしまいました！(ハズレ)';
        resultDiv.style.color = '#d13438';
        // 爆弾の位置をリセット
        bombNumber = Math.floor(Math.random() * 10) + 1;
      } else {
        resultDiv.innerHTML = '🟢 セーフ！お見事です！';
        resultDiv.style.color = '#107c41';
      }
    }

    // おみくじ機能
    function drawOmikuji() {
      const fortunes = [
        '🌟 大吉：すべてのプッシュが一発で✅になります！ラッキーアイテム：認証トークン',
        '🙂 吉：エラーが出ても原因がすぐに見つかるでしょう。',
        '🔺 凶：git pull を忘れて競合（Conflict）が起きる予感。落ち着いて対処しましょう。',
        '💀 大凶：deployment_token missing が再発するかもしれません！シークレットを確認せよ！'
      ];
      const random = Math.floor(Math.random() * fortunes.length);
      document.getElementById('omikuji-result').innerText = fortunes[random];
    }
  </script>
</body>
</html>
