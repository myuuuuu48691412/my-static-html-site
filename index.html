<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>夏休み！屋台の出し物ルーレット</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #fff5e6; /* 屋台らしい温かみのある背景色 */
      text-align: center;
      padding-top: 50px;
    }
    .container {
      background-color: white;
      border: 4px solid #cc3300; /* お祭りカラーの赤 */
      border-radius: 12px;
      padding: 30px;
      display: inline-block;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 90%;
    }
    h1 {
      color: #cc3300;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .roulette-display {
      font-size: 36px;
      font-weight: bold;
      color: #333;
      background: #f0f0f0;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border: 2px dashed #666;
      min-height: 54px;
    }
    button {
      font-size: 18px;
      font-weight: bold;
      padding: 12px 24px;
      background-color: #ff9900; /* お祭りカラーのオレンジ */
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px #cc7a00;
      transition: all 0.1s;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: none;
    }
    button:disabled {
      background-color: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }
    .result-msg {
      font-size: 20px;
      font-weight: bold;
      color: #cc3300;
      margin-top: 20px;
      min-height: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🏮 夏休み！屋台ルーレット 🏮</h1>
    <p>お祭りで最初に食べる屋台の出し物を決めよう！</p>
    
    <div class="roulette-display" id="display">❓ ❓ ❓</div>
    
    <button id="spin-btn" onclick="startRoulette()">ルーレットを回す！</button>
    
    <div class="result-msg" id="result"></div>
  </div>

  <script>
    // ルーレットの中身（夏休みの屋台の出し物）
    const items = [
      '🍧 かき氷', 
      '🐙 たこ焼き', 
      '🏮 焼きそば', 
      '🍎 りんご飴', 
      '🍫 チョコバナナ', 
      '🌭 フランクフルト', 
      '🦑 イカ焼き', 
      '🎯 射的ゲーム'
    ];
    let timer = null;

    function startRoulette() {
      const btn = document.getElementById('spin-btn');
      const display = document.getElementById('display');
      const result = document.getElementById('result');
      
      btn.disabled = true; // 連打防止
      result.innerText = '';
      let count = 0;

      // 0.1秒ごとにランダムで出し物を切り替える（回転演出）
      timer = setInterval(() => {
        const randomItem = items[Math.floor(Math.random() * items.length)];
        display.innerText = randomItem;
        count++;

        // 15回切り替わったらストップ
        if (count > 15) {
          clearInterval(timer);
          btn.disabled = false;
          
          // 最終決定
          const finalItem = items[Math.floor(Math.random() * items.length)];
          display.innerText = finalItem;
          result.innerText = '🎯 今日のおすすめは「' + finalItem + '」に決定！';
        }
      }, 100);
    }
  </script>
</body>
</html>
